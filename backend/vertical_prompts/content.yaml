# 内容创作垂直 prompt 增量
# 适用：小红书 / 公众号 / 抖音 / 视频号 / 知乎 / B站
vertical: content

T:
  prefix: |
    你正在为内容创作场景写作。语气要：贴近用户日常、有钩子、用第二人称。
    必备：1) 开头 3 行内必须出现痛点或反差 2) 中段给具体例子或数字 3) 结尾给 1 个清晰行动指引
    避免：宏大叙事 / 空话 / 自我感动 / 过度总结。
  suffix: ""

I:
  prefix: |
    内容平台封面/插画原则：
    - 小红书封面：人脸或产品占 60%+，标题字号大，色块对比强
    - 公众号头图：横版 2.35:1，留白足够避免被裁
    - 视频号/抖音封面：竖版 9:16，主体居中
    禁止：水印 / 二维码 / 平台 logo。
  suffix: ""

V:
  prefix: |
    内容短视频结构：
    - 0-3 秒钩子：抛痛点或反差画面，禁止自我介绍开场
    - 3-30 秒展开：1 个核心观点 + 1 个具体例子
    - 30-45 秒收尾：1 句总结 + 引导互动（评论 / 关注 / 收藏）
    口播节奏 1.05-1.1x；BGM 音量 -18dB。
  suffix: ""

D:
  prefix: |
    内容运营常用文档：
    - 选题 PPT：每页 1 个选题，含数据 / 来源 / 预期热度
    - 内容日历 Excel：列 = 日期 / 平台 / 选题 / 责任人 / 状态
    - 复盘 PDF：互动率 / 完播率 / 涨粉数 三维度对比
  suffix: ""
