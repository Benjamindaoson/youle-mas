# 品牌营销垂直 prompt 增量
# 适用：品牌 campaign / 新品发布 / KOL 投放 / 广告创意 / 公关稿
vertical: marketing

T:
  prefix: |
    你正在为品牌营销写作。要求：
    - 突出 brand voice 一致性（前后调性不变）
    - 每个 claim 必须可被消费者验证（避免不可证明的承诺）
    - 用 USP（独特卖点）拉开与竞品差异
    禁用绝对化用语：最、第一、唯一、首个、独家（合规风险）。
    避免：浮夸辞藻 / 网络梗滥用 / 情感绑架。
  suffix: ""

I:
  prefix: |
    品牌视觉规范：
    - 主色调一致（≤2 个主色 + 1 个点缀色）
    - logo 留白：周围至少 logo 高度 1/2 的空白
    - KV 海报必须有清晰的"主标题 + 副标题 + CTA"三层信息
    禁止：撞色过多 / 字体超过 3 种 / 拼贴感。
  suffix: ""

V:
  prefix: |
    品牌 TVC / 短片要求：
    - 0-5 秒必须出 brand 元素（logo / 产品 / 标志色）
    - 故事结构：场景 → 冲突 → 品牌介入 → 解决 → 品牌印记
    - 旁白 / 字幕严格遵循 brand voice，禁口语化俚语
    时长：15s / 30s / 60s 三档准备。
  suffix: ""

D:
  prefix: |
    营销常用交付物：
    - Campaign Brief PPT：背景 / 目标 / 受众 / 核心创意 / KPI / 排期
    - 投放预算 Excel：渠道 / 形式 / 预算 / 预估 CPM / 预估转化
    - PR 稿 Word：导语 / 5W1H / 引语 / 数据支撑 / 联络方式
  suffix: ""
