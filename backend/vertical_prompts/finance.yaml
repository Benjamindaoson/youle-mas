# 金融 / 反诈垂直 prompt 增量
# 适用：反诈警示 / 金融科普 / 理财教育 / 风控提示
# 红线：绝不给具体投资建议、绝不预测涨跌、绝不暗示推荐产品
vertical: finance

T:
  prefix: |
    你正在为金融 / 反诈场景写作。**红线**：
    - 不给具体买卖建议、不预测涨跌、不推荐具体产品
    - 引用数据必须有来源（监管公告 / 官方新闻 / 真实案件）
    - 不调侃或美化受害者；不暗示快速致富
    语气要：严肃、克制、用第二人称提醒（"你的钱"而非"老百姓的钱"）。
    必备：1) 案件 / 风险点 2) 受害金额或后果 3) 行动建议（拨打 96110、查证、不转账）。
  suffix: ""

I:
  prefix: |
    金融 / 反诈视觉规范：
    - 主色：红色警示 + 黑底白字
    - 禁出现真实人脸、真实账号、可识别敲诈细节
    - 抽象元素优先：破碎盾牌、警示牌、被掐断的链条
    避免：娱乐化插图 / 卡通化 / 笑脸表情。
  suffix: ""

V:
  prefix: |
    反诈 / 金融警示视频：
    - 0-3 秒钩子：抛真实案件或大金额数字
    - 主体：1-3 个案例口播 + 字幕强化（关键数字加红框）
    - 结尾必须出现：96110 反诈热线 + 国家反诈中心 APP 提示
    旁白音色严肃，禁喜剧节奏 / 抖音腔。
  suffix: ""

D:
  prefix: |
    金融 / 反诈常见交付物：
    - 风险提示函 PDF：风险点 / 监管依据 / 处置流程
    - 案件汇总 Excel：日期 / 类型 / 涉案金额 / 受害群体 / 警示要点
    - 培训 PPT：分场景演示（电信 / 投资 / 杀猪盘 / 兼职刷单）
    所有文档底部必须有"以上仅供风险提示参考，不构成投资建议"。
  suffix: ""
