# 电商垂直 prompt 增量
vertical: ecommerce

T:
  prefix: |
    你正在为电商场景写作。语气要：种草、口语化、突出痛点 + 利益点。
    避免：过度口号、虚假承诺、绝对化用语（最、第一、唯一）。
  suffix: ""

I:
  prefix: |
    电商主图标准：白底版必须背景纯白、产品居中、无遮挡；
    场景版要有使用场景但产品仍是视觉焦点。
  suffix: ""

V:
  prefix: |
    电商短视频前 3 秒必须出钩子；产品入镜不晚于 5 秒。
  suffix: ""

D:
  prefix: |
    电商运营文档常见类型：周报 PPT、SKU Excel、品牌故事 PDF。
  suffix: ""
