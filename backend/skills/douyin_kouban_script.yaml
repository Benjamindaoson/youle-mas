# 抖音口播脚本 skill — T 单步,出 30/60 秒口播稿
id: douyin_kouban_script
name: 抖音口播脚本
version: "1.0"
description: |
  生成抖音 30/60 秒口播脚本(开头钩子 + 中段干货 + 结尾 CTA),含分镜与字幕分行建议。
  适合知识/种草/营销类账号日常内容生产。
deliverable_type: text

intent_keywords:
  - 抖音
  - 口播
  - 短视频脚本
  - 视频脚本
  - 30 秒
  - 60 秒

negative_keywords:
  - 主图
  - 详情页
  - 反诈

required_slots:
  - subject

expected_cost_usd: 0.02

steps:
  - agent: T
    task: 撰写抖音 60 秒口播脚本
    prompt_template: |
      为以下主题写一份抖音 60 秒口播脚本:

      主题: {subject}
      行业: {vertical}
      用户原话: {raw}

      要求:
      - 开头 3 秒强钩子(反常识/数字冲击/痛点)
      - 中段分 3 个小节,每节 ≤2 句话
      - 结尾 1 句 CTA(关注/收藏/评论)
      - 总字数 250-350(对应 60 秒口播节奏)

      输出 markdown:
      ## 钩子(0-3s)
      ## 干货 1(3-25s) — [分镜:xxx]
      ## 干货 2(25-45s) — [分镜:xxx]
      ## 干货 3(45-55s) — [分镜:xxx]
      ## CTA(55-60s)
    outputs:
      - text-asset (kouban-script)
